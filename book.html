<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book a call with Andrew Mercer</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --ink: #1c2330;
    --muted: #6b7480;
    --line: #e4e7ec;
    --accent: #2f6df0;
    --accent-ink: #ffffff;
    --ok: #137a4b;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--font); line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px 64px; }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); overflow: hidden;
  }
  .head { display: flex; align-items: center; gap: 14px; padding: 22px 24px; border-bottom: 1px solid var(--line); }
  .avatar {
    width: 46px; height: 46px; border-radius: 50%; flex: none;
    background: #dfe6f6; color: #2f4a86; display: grid; place-items: center;
    font-weight: 600; font-size: 16px; letter-spacing: .5px;
  }
  .head h1 { margin: 0; font-size: 17px; font-weight: 600; }
  .head .sub { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
  .body { padding: 20px 24px 24px; }

  .status { color: var(--muted); font-size: 14px; padding: 8px 0 4px; }
  .err { color: #a3262d; font-size: 14px; }

  .daygroup { margin-top: 14px; }
  .dayhead { font-size: 13px; font-weight: 600; color: var(--muted); margin: 14px 0 8px; text-transform: none; }
  .slot {
    display: block; width: 100%; text-align: left; cursor: pointer;
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px; font: inherit; color: var(--ink);
    transition: border-color .12s, background .12s;
  }
  .slot:hover { border-color: var(--accent); background: #f5f8ff; }
  .slot[aria-disabled="true"] { color: var(--muted); cursor: default; text-decoration: line-through; background: #fafafa; }
  .slot[aria-disabled="true"]:hover { border-color: var(--line); background: #fafafa; }

  .form { margin-top: 6px; }
  .pickline { font-size: 14px; color: var(--muted); margin-bottom: 14px; }
  .pickline b { color: var(--ink); font-weight: 600; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 5px; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  input {
    width: 100%; padding: 11px 12px; border: 1px solid var(--line);
    border-radius: 10px; font: inherit; color: var(--ink); background: #fff;
  }
  input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .actions { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
  .btn {
    background: var(--accent); color: var(--accent-ink); border: none;
    border-radius: 10px; padding: 12px 18px; font: inherit; font-weight: 600;
    cursor: pointer;
  }
  .btn:disabled { opacity: .55; cursor: default; }
  .btn.ghost { background: transparent; color: var(--accent); padding: 12px 6px; }

  .done { text-align: center; padding: 18px 4px 8px; }
  .done .tick { width: 48px; height: 48px; border-radius: 50%; background: #e7f4ec; color: var(--ok); display: grid; place-items: center; margin: 0 auto 14px; font-size: 24px; }
  .done h2 { font-size: 18px; margin: 0 0 6px; }
  .done p { color: var(--muted); font-size: 14px; margin: 4px 0; }

  .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="avatar">AM</div>
        <div>
          <h1>Book a call with Andrew Mercer</h1>
          <p class="sub">30 min · video</p>
        </div>
      </div>
      <div class="body" id="body">
        <div class="status" id="status">Loading available times…</div>
      </div>
    </div>
    <div class="foot">Powered by SpamViking scheduling</div>
  </div>

<script>
(function () {
  // slug comes from the path /book/<slug> (or ?slug= as a fallback)
  function getSlug() {
    var m = location.pathname.match(/\/book\/([^\/?#]+)/);
    if (m) return decodeURIComponent(m[1]);
    return new URLSearchParams(location.search).get("slug") || "";
  }
  var slug = getSlug();
  var body = document.getElementById("body");
  var state = { slots: [], reschedule: false, picked: null };

  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

  if (!slug) { body.innerHTML = '<div class="err">This booking link looks incomplete. Please use the link from your email.</div>'; return; }

  // 1. Load the render-safe view of the token (server computes visible slots)
  fetch("/api/render?slug=" + encodeURIComponent(slug))
    .then(function (r) { if (!r.ok) throw new Error("render"); return r.json(); })
    .then(function (data) {
      state.slots = data.slots || [];
      state.reschedule = !!data.reschedule;
      renderSlots();
    })
    .catch(function () {
      body.innerHTML = '<div class="err">We couldn\u2019t load times right now. Please try the link again in a moment.</div>';
    });

  function renderSlots() {
    if (!state.slots.length) {
      body.innerHTML = '<div class="status">No times are open at the moment \u2014 Andrew\u2019s assistant will email you with new options shortly.</div>';
      return;
    }
    var intro = state.reschedule
      ? '<div class="status">Pick a new time for your call.</div>'
      : '<div class="status">Pick a time that works for you.</div>';
    // group slots by day label
    var groups = {};
    var order = [];
    state.slots.forEach(function (s) {
      if (!groups[s.day]) { groups[s.day] = []; order.push(s.day); }
      groups[s.day].push(s);
    });
    var html = intro;
    order.forEach(function (day) {
      html += '<div class="daygroup"><div class="dayhead">' + esc(day) + '</div>';
      groups[day].forEach(function (s) {
        html += '<button class="slot" data-iso="' + esc(s.iso) + '" data-label="' + esc(s.day + ' at ' + s.time) + '">' + esc(s.time) + '</button>';
      });
      html += '</div>';
    });
    body.innerHTML = html;
    Array.prototype.forEach.call(body.querySelectorAll(".slot"), function (b) {
      b.addEventListener("click", function () {
        state.picked = { iso: b.getAttribute("data-iso"), label: b.getAttribute("data-label") };
        renderForm();
      });
    });
  }

  function renderForm() {
    body.innerHTML =
      '<div class="form">' +
        '<div class="pickline">' + (state.reschedule ? "New time: " : "Selected: ") + '<b>' + esc(state.picked.label) + '</b> \u00b7 <button class="btn ghost" id="back" type="button">change</button></div>' +
        '<div class="row">' +
          '<div><label for="fn">First name</label><input id="fn" autocomplete="given-name"></div>' +
          '<div><label for="ln">Last name</label><input id="ln" autocomplete="family-name"></div>' +
        '</div>' +
        '<label for="em">Email</label><input id="em" type="email" autocomplete="email" placeholder="you@company.com">' +
        '<div class="actions"><button class="btn" id="confirm" type="button">' + (state.reschedule ? "Reschedule call" : "Confirm booking") + '</button><span class="err" id="ferr"></span></div>' +
      '</div>';
    document.getElementById("back").addEventListener("click", renderSlots);
    document.getElementById("confirm").addEventListener("click", submit);
  }

  function submit() {
    var fn = document.getElementById("fn").value.trim();
    var ln = document.getElementById("ln").value.trim();
    var em = document.getElementById("em").value.trim();
    var ferr = document.getElementById("ferr");
    ferr.textContent = "";
    if (!fn || !ln) { ferr.textContent = "Please enter your name."; return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)) { ferr.textContent = "Please enter a valid email."; return; }
    var btn = document.getElementById("confirm");
    btn.disabled = true; btn.textContent = "Booking\u2026";

    fetch("/api/book", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ slug: slug, name: fn + " " + ln, email: em, slot: state.picked.iso })
    })
      .then(function (r) { if (!r.ok) throw new Error("book"); return r.json().catch(function(){ return {}; }); })
      .then(function () { renderDone(); })
      .catch(function () {
        btn.disabled = false; btn.textContent = state.reschedule ? "Reschedule call" : "Confirm booking";
        ferr.textContent = "Something went wrong saving that. Please try again.";
      });
  }

  function renderDone() {
    body.innerHTML =
      '<div class="done">' +
        '<div class="tick">\u2713</div>' +
        '<h2>' + (state.reschedule ? "Your call is rescheduled" : "You\u2019re booked") + '</h2>' +
        '<p><b>' + esc(state.picked.label) + '</b></p>' +
        '<p>A calendar invite is on its way to your inbox. Andrew will see you then.</p>' +
      '</div>';
  }
})();
</script>
</body>
</html>
