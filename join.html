<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Joining your call…</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f3f5f8; color: #1c2430;
  }
  .panel { text-align: center; max-width: 440px; padding: 32px 24px; }
  .avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: #2f5fd6; color: #fff; font-weight: 600; font-size: 22px;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 18px;
  }
  h1 { font-size: 19px; margin: 0 0 8px; }
  p { color: #6b7685; font-size: 14px; margin: 6px 0; }
  .spinner {
    width: 26px; height: 26px; margin: 18px auto 0;
    border: 3px solid #d4dae3; border-top-color: #2f5fd6; border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
</style>
</head>
<body>
  <div class="panel">
    <div class="avatar">AM</div>
    <h1 id="title">Connecting you to Andrew…</h1>
    <p id="sub">One moment while we set up your call.</p>
    <div class="spinner" id="spin"></div>
  </div>

<script>
  var slug = location.pathname.split('/').filter(Boolean).pop() || '';

  function fail(msg) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('title').textContent = 'We couldn\u2019t start the call';
    document.getElementById('sub').textContent = msg || 'Please try the link in your invite again.';
  }

  // Connect the browser to the minted call. PE's /api/join response shape is
  // being locked via the smoke-test; we handle the common Vapi web-call fields
  // and fall back to a clear message. This is the one spot to finalize once the
  // shape is confirmed.
  function connect(data) {
    var url =
      data.webCallUrl ||
      data.url ||
      (data.call && (data.call.webCallUrl || data.call.url)) ||
      null;
    if (url) {
      window.location.href = url;
      return;
    }
    document.getElementById('spin').style.display = 'none';
    document.getElementById('title').textContent = 'Your call is ready';
    document.getElementById('sub').textContent =
      'Connection received — final wiring pending PE\u2019s join shape.';
  }

  fetch('/api/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slug: slug }),
  })
    .then(function (r) { if (!r.ok) throw new Error('start'); return r.json(); })
    .then(connect)
    .catch(function () { fail(); });
</script>
</body>
</html>
